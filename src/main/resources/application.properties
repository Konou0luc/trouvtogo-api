server.port=${PORT:8081}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/collectobjet}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HBM2DDL:update}
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
# Control whether Spring runs `data.sql` and friends. Set `SPRING_SQL_INIT_MODE=always` for local/dev.
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

# HikariCP connection pool tuning — reduce defaults for constrained hosts (override via env)
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${SPRING_DATASOURCE_LEAK_DETECTION_THRESHOLD:2000}

# Application toggles
app.fix-bytea.enabled=${APP_FIX_BYTEA_ENABLED:false}

# Logging (reduce noisy SQL logs in production)
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql=ERROR
logging.level.com.objetcol=INFO

# ========================

# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ========================
# Cloudinary — définir CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ========================
# CORS (origines du front Next.js, séparées par des virgules)
# ========================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ========================
# Upload multipart
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ========================
# SMS
# ========================
sms.enabled=false
sms.provider=africastalking

# Africa's Talking (optionnel)
africastalking.username=${AFRICASTALKING_USERNAME:sandbox}
africastalking.api-key=${AFRICASTALKING_API_KEY:}
